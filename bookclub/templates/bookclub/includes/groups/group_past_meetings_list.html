{% load static %}
<div class="mb-4 previous-books-container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="h5 mb-0 previous-books-title"><i class="bi bi-clock-history me-2"></i>Past Meetings</h3>
  </div>

  <!-- Toggle button (matches Previous Books) -->
  <button class="btn btn-outline-secondary mb-3 btn-previous-books-toggle" type="button"
          data-bs-toggle="collapse" data-bs-target="#pastMeetingsCollapse"
          aria-expanded="false" aria-controls="pastMeetingsCollapse">
      <span>Show Past Meetings <span class="badge badge-book-count ms-2">{{ past_meetings|length }}</span></span>
      <i class="bi bi-chevron-down collapse-indicator"></i>
  </button>

  <!-- Collapsible container for past meetings -->
  <div class="collapse" id="pastMeetingsCollapse">
    <div class="card shadow-sm mb-4">
      <div class="card-header bg-white">
        <div class="d-flex justify-content-between align-items-center">
          <h4 class="h6 mb-0">Meeting History</h4>
        </div>
      </div>
      <div class="card-body p-0">
        {% if past_meetings %}
        <div class="table-responsive">
          <table class="table table-sm mb-0">
            <thead>
              <tr>
                <th scope="col">Title</th>
                <th scope="col">Start</th>
                <th scope="col" class="text-center">Participants</th>
                <th scope="col" class="text-end">Details</th>
              </tr>
            </thead>
            <tbody>
              {% for meeting in past_meetings %}
              <tr>
                <td class="align-middle"><a href="{% url 'meeting-detail' meeting.id %}">{{ meeting.display_title }}</a></td>
                <td class="align-middle">{{ meeting.start_time|date:"M d, Y H:i" }}</td>
                <td class="align-middle text-center">{{ meeting.yes_count }}</td>
                <td class="align-middle text-end">
                  <a class="btn btn-outline-secondary btn-sm" href="{% url 'meeting-detail' meeting.id %}">View</a>
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
        {% else %}
        <div class="p-3 text-muted">No past meetings.</div>
        {% endif %}
      </div>
    </div>
  </div>
</div>
